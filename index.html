<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content= "jaspreet and Blake">
    <meta name="description" content="html, css, web, web development, javascript">
    <title>BlinkType  |  Fast typing Game</title>
    <link rel="stylesheet" href="./assets/style/style.css" media="all" />
    <script src="./assets/script/script.js" type="module" defer></script>
</head>
<body>
     <main class="container">
    <section class="game-card">
     <h1 class="logo-text">Blink<span>Type</span></h1> 
      <p class="subtitle">Unleash your typing power.</p>
      <div class="stats">
        <div class="stat-box">
          <span>Time Left</span>
          <p id="time">99</p>
        </div>
        <div class="stat-box">
          <span>Hits</span>
          <p id="hits">0</p>
        </div>
      </div>
       <div  id="high-scores">
     <h3>Top 9 High Scores</h3>
     <ol id="scores-list">
         <li>No scores yet</li>
     </ol>
    </div>
      <div class="word-box">
        <p class="word-title">Current Word</p>
        <h2 id="current-word">Press Start</h2>
      </div>
      <input
        type="text"
        id="word-input"
        autocomplete="off"
        disabled
      >
       <audio id="bg-music" loop>
        <source src="assets/media/game-music.mp3" type="audio/mpeg">
       </audio>
      <div class="buttons">
        <button id="start-btn">New Game</button>
      </div>
      <p id="message">Ready to play?</p>
    </section>
    <dialog id="score-summary" closedby="any">
        <h3>Final Score</h3>
        <p id="final-date">Date:</p>
        <p id="final-hits">Hits:</p>
        <p id="final-percentage">Percentage:</p>
    </dialog>
  </main>   
</body>
</html>
